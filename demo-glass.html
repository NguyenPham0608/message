<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Liquid Glass – Corrected</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("public/images.jpeg");
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* Glass element */
        .glass {
            width: 300px;
            height: 300px;
            border-radius: 40px;
            padding: 30px;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: url(#liquidGlassFilter) blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 40px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="glass">
        <h2>Liquid Glass</h2>
        <p>True refraction using SVG displacement maps.</p>
    </div>

    <!-- SVG FILTER -->
    <svg width="0" height="0">
        <filter id="liquidGlassFilter" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">

            <feImage id="displacementImage" result="disp" x="0%" y="0%" width="100%" height="100%"
                preserveAspectRatio="none" />

            <feDisplacementMap in="SourceGraphic" in2="disp" scale="60" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <script>
        const glass = document.querySelector(".glass");
        const cornerRadius = 40;
        const glassThickness = 60;

        function roundedRectDistance(x, y, w, h, r) {
            const qx = Math.abs(x) - (w / 2 - r);
            const qy = Math.abs(y) - (h / 2 - r);
            const ex = Math.max(qx, 0);
            const ey = Math.max(qy, 0);
            return Math.sqrt(ex * ex + ey * ey) + Math.min(Math.max(qx, qy), 0) - r;
        }

        function surface(d) {
            if (d > 0) return 0;
            const t = Math.min(Math.abs(d) / glassThickness, 1);
            return (1 - t * t) * glassThickness;
        }

        function generateDisplacement() {

            const rect = glass.getBoundingClientRect();
            const width = Math.floor(rect.width);
            const height = Math.floor(rect.height);

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            const imageData = ctx.createImageData(width, height);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {

                    const dx = x - width / 2;
                    const dy = y - height / 2;

                    const dist = roundedRectDistance(dx, dy, width, height, cornerRadius);
                    const i = (y * width + x) * 4;

                    if (dist <= 0) {

                        const delta = 0.5;
                        const h0 = surface(dist);
                        const h1 = surface(dist + delta);
                        const derivative = (h1 - h0) / delta;

                        // Radial inward normal for realistic edge curvature
                        const radialLength = Math.sqrt(dx * dx + dy * dy) + 0.0001;
                        const nx = -derivative * (dx / radialLength);
                        const ny = -derivative * (dy / radialLength);

                        const mag = Math.sqrt(nx * nx + ny * ny) + 0.0001;
                        const normX = nx / mag;
                        const normY = ny / mag;

                        imageData.data[i + 0] = 128 + normX * 127;
                        imageData.data[i + 1] = 128 + normY * 127;
                        imageData.data[i + 2] = 128;
                        imageData.data[i + 3] = 255;

                    } else {

                        imageData.data[i + 0] = 128;
                        imageData.data[i + 1] = 128;
                        imageData.data[i + 2] = 128;
                        imageData.data[i + 3] = 255;

                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            document
                .getElementById("displacementImage")
                .setAttribute("href", canvas.toDataURL());
        }

        // Generate once
        generateDisplacement();

        // Regenerate on resize
        window.addEventListener("resize", generateDisplacement);

    </script>

</body>

</html>
